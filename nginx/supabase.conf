# Supabase reverse proxy configuration
# Place in /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/
#
# Prerequisites:
#   - Cloudflare origin certificate at /etc/nginx/ssl/cloudflare-origin.pem
#   - Cloudflare private key at /etc/nginx/ssl/cloudflare-private.key
#   - DNS records for db.subhbits.com and studio.subhbits.com pointing to this VM

# Supabase API (Kong gateway)
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name db.subhbits.com;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-private.key;

    # SSL hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # HSTS
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Supabase API
    location / {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Timeout settings for long-running queries
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Realtime WebSocket support
    location /realtime/ {
        proxy_pass http://localhost:8000;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# HTTP → HTTPS redirect for API
server {
    listen 80;
    listen [::]:80;
    server_name db.subhbits.com;
    return 301 https://$host$request_uri;
}

# Supabase Studio
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name studio.subhbits.com;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-private.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    location / {
        proxy_pass http://localhost:3001;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
    }
}

# HTTP → HTTPS redirect for Studio
server {
    listen 80;
    listen [::]:80;
    server_name studio.subhbits.com;
    return 301 https://$host$request_uri;
}
# Supabase reverse proxy configuration
# Place in /etc/nginx/sites-available/ and symlink to /etc/nginx/sites-enabled/
#
# Prerequisites:
#   - Cloudflare origin certificate at /etc/nginx/ssl/cloudflare-origin.pem
#   - Cloudflare private key at /etc/nginx/ssl/cloudflare-private.key
#   - DNS records for db.subhbits.com and studio.subhbits.com pointing to this VM
#   - OCI security list allowing ingress on ports 80 and 443
#   - iptables rules allowing ports 80 and 443 (before the OCI REJECT rule)

# Supabase API (db.subhbits.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name db.subhbits.com;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # Increase max body size for file uploads
    client_max_body_size 50M;

    # HSTS (Cloudflare already enforces HTTPS, but belt-and-suspenders)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Kong gateway handles all Supabase API routes
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Realtime WebSocket support
    location /realtime/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}

# HTTP → HTTPS redirect for API
server {
    listen 80;
    listen [::]:80;
    server_name db.subhbits.com;
    return 301 https://$host$request_uri;
}

# Supabase Studio (studio.subhbits.com)
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studio.subhbits.com;

    ssl_certificate /etc/nginx/ssl/cloudflare-origin.pem;
    ssl_certificate_key /etc/nginx/ssl/cloudflare-private.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    client_max_body_size 50M;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Studio runs on host port 3001 (container port 3000)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port 443;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# HTTP → HTTPS redirect for Studio
server {
    listen 80;
    listen [::]:80;
    server_name studio.subhbits.com;
    return 301 https://$host$request_uri;
}